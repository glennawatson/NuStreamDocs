# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Groupings keep PR volume manageable: bumps that share a release cadence
# land together. Group order matters — Dependabot assigns each package
# to the first group whose patterns match, so narrower groups
# (sourcedocparser, analyzers, test-stack) are listed before the
# catch-all microsoft group.

version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      sourcedocparser:
        # SourceDocParser ships its own packages in lock-step; bundle
        # them so the api-generator pin moves together.
        patterns:
          - "SourceDocParser*"
      analyzers:
        patterns:
          - "*.Analyzers"
          - "stylecop.analyzers"
          - "Roslynator.*"
          - "SonarAnalyzer.*"
          - "Blazor.Common.*"
      test-stack:
        patterns:
          - "TUnit*"
          - "Verify.TUnit"
          - "NSubstitute"
          - "Microsoft.Testing.*"
          - "BenchmarkDotNet*"
      microsoft:
        # Catch-all for the rest of the Microsoft / System extensions we
        # ride on (Microsoft.Extensions.*, Microsoft.SourceLink.*,
        # System.* runtime out-of-band packages, etc).
        patterns:
          - "Microsoft.*"
          - "System.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "dotnet/*"
