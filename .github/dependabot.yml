# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Groupings keep PR volume manageable: bumps that share a release cadence
# land together. Group order matters — Dependabot assigns each package
# to the first group whose patterns match, so narrower groups
# (sourcedocparser, analyzers, polly, perf-tooling, test-stack) are
# listed before the catch-all microsoft group.

version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      sourcedocparser:
        # SourceDocParser ships its own packages in lock-step; bundle
        # them so the api-generator pin moves together.
        patterns:
          - "SourceDocParser*"
      analyzers:
        patterns:
          - "*.Analyzers"
          - "stylecop.analyzers"
          - "Roslynator.*"
          - "SonarAnalyzer.*"
          - "Blazor.Common.*"
      polly:
        patterns:
          - "Polly*"
      perf-tooling:
        # Benchmarking and allocation-reporting dependencies tend to move
        # together and are only consumed by the perf harness / tooling.
        patterns:
          - "BenchmarkDotNet*"
          - "Microsoft.Diagnostics.Tracing.TraceEvent"
      test-stack:
        patterns:
          - "TUnit*"
          - "Verify.TUnit"
          - "NSubstitute"
          - "Microsoft.Testing.*"
          - "Microsoft.Extensions.TimeProvider.Testing"
      microsoft:
        # Catch-all for the rest of the Microsoft / System extensions we
        # ride on (Microsoft.Extensions.*, Microsoft.SourceLink.*,
        # System.* runtime out-of-band packages, etc).
        patterns:
          - "Microsoft.*"
          - "System.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      core-actions:
        patterns:
          - "actions/*"
          - "dotnet/*"
          - "github/*"
      release-actions:
        # Release-only vendor actions should land together so signing /
        # publishing workflow changes stay in one PR.
        patterns:
          - "SSLcom/*"
          - "NuGet/*"
