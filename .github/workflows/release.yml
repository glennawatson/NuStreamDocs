name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install GitVersion CLI
        run: dotnet tool install -g GitVersion.Tool

      - name: Resolve version (GitVersion)
        id: ver
        run: |
          # GitVersion is the source of truth — ContinuousDeployment on main
          # gives a clean MAJOR.MINOR.PATCH driven by height. No tag bumping,
          # no manual choices.
          VERSION="$(dotnet-gitversion /showvariable MajorMinorPatch)"
          if [ -z "$VERSION" ]; then
            echo "GitVersion returned empty version." >&2
            exit 1
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/NuStreamDocs.slnx

      - name: Build
        run: dotnet build src/NuStreamDocs.slnx --no-restore --configuration Release

      - name: Pack
        run: dotnet pack src/NuStreamDocs.slnx --no-build --configuration Release -o packages

      - name: Sign packages with SSL.com eSigner
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          dir_path: ./packages
          output_path: ./signed
          malware_block: true
          jvm_max_memory: 2048M

      - name: Upload signed packages
        uses: actions/upload-artifact@v7
        with:
          name: signed-nuget
          path: ./signed/*.nupkg
          if-no-files-found: error

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          for pkg in ./signed/*.nupkg; do
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          done

      - name: Install GitReleaseNoteGenerator
        run: dotnet tool install -g GitReleaseNoteGenerator

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-release-notes --release-version "${{ steps.ver.outputs.version }}" --output-file release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # gh release create creates the tag at HEAD automatically — no explicit
        # `git tag` step needed.
        run: gh release create "${{ steps.ver.outputs.tag }}" --repo "${{ github.repository }}" --title "${{ steps.ver.outputs.version }}" --notes-file release-notes.md ./signed/*.nupkg
