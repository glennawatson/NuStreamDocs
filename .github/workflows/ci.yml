name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # CI builds aren't shipped, so a static override skips MinVer's per-project git walk.
      MINVERVERSIONOVERRIDE: 0.0.0-ci.0+${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/NuStreamDocs.slnx

      - name: Build
        run: dotnet build src/NuStreamDocs.slnx --no-restore --configuration Release

      - name: Test
        working-directory: src
        run: dotnet test --solution NuStreamDocs.slnx --no-build --configuration Release
